<!-- Intégration Firebase Temps Réel - Configurée et prête à l'emploi -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

  // Connexion directe à votre base de données barber-pro-dz
  const firebaseConfig = {
    databaseURL: "https://barber-pro-dz-default-rtdb.europe-west1.firebasedatabase.app/"
  };

  const app = initializeApp(firebaseConfig);
  const dbCloud = getDatabase(app);
  const noeudSalon = ref(dbCloud, 'barber_pro_db');

  // Écoute des changements (prix, horaires) faits par l'admin
  onValue(noeudSalon, (snapshot) => {
    const donnees = snapshot.val();
    if (donnees) {
      Object.keys(donnees).forEach(cle => {
        localStorage.setItem(cle, JSON.stringify(donnees[cle]));
      });
      if (typeof rafraichirInterfaceClient === 'function') {
        rafraichirInterfaceClient();
      }
    }
  });

  // Interception et envoi immédiat des réservations des clients dans votre Cloud
  if (typeof DB !== 'undefined' && DB.set) {
    const ancienSet = DB.set;
    DB.set = function(cle, valeur) {
      localStorage.setItem(cle, JSON.stringify(valeur));
      set(ref(dbCloud, 'barber_pro_db/' + cle), valeur);
    };
  }
</script>
