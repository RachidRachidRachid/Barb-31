<!-- Intégration Firebase Temps Réel Admin - Configurée et prête à l'emploi -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

  // Connexion directe à votre base de données barber-pro-dz
  const firebaseConfig = {
    databaseURL: "https://barber-pro-dz-default-rtdb.europe-west1.firebasedatabase.app/"
  };

  const app = initializeApp(firebaseConfig);
  const dbCloud = getDatabase(app);
  const noeudSalon = ref(dbCloud, 'barber_pro_db');

  let premierChargement = true;

  // Réception en direct des rendez-vous pris par les clients
  onValue(noeudSalon, (snapshot) => {
    const donneesCloud = snapshot.val();
    if (donneesCloud) {
      let nouveauRendezVous = false;

      Object.keys(donneesCloud).forEach(cle => {
        const localData = localStorage.getItem(cle);
        const cloudDataStr = JSON.stringify(donneesCloud[cle]);
        
        if (localData !== cloudDataStr) {
          localStorage.setItem(cle, cloudDataStr);
          nouveauRendezVous = true;
        }
      });

      // Alerte instantanée si un rendez-vous tombe pendant que l'admin regarde son écran
      if (nouveauRendezVous && !premierChargement) {
        if (typeof notifierAdmin === 'function') {
          notifierAdmin("<i class='fa-solid fa-bell anim-cloche'></i> Nouveau rendez-vous enregistré en direct !");
        }
        
        if (window.calendar && typeof window.calendar.refetchEvents === 'function') {
          window.calendar.refetchEvents();
        } else {
          setTimeout(() => location.reload(), 1200);
        }
      }
      premierChargement = false;
    }
  });

  // Envoi automatique des modifications de l'admin (annulation, blocage de créneau) vers le Cloud
  if (typeof DB !== 'undefined' && DB.set) {
    DB.set = function(cle, valeur) {
      localStorage.setItem(cle, JSON.stringify(valeur));
      set(ref(dbCloud, 'barber_pro_db/' + cle), valeur);
    };
  }
</script>

<style>
  /* Animation visuelle pour l'alerte de la cloche */
  @keyframes secousse-cloche {
    0%, 100% { transform: rotate(0deg); }
    25% { transform: rotate(15deg); }
    75% { transform: rotate(-15deg); }
  }
  .anim-cloche { display: inline-block; animation: secousse-cloche 0.5s ease 3; color: #d4af37; }
</style>
