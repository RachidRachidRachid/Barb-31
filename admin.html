<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Administration — BARBER PRO DZ</title>
<meta name="robots" content="noindex">
<link rel="icon" href="icons/icon-192.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Poppins:wght@300;400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css">
<style>
:root {
  --noir: #0b0b0c;
  --noir-carte: #17171b;
  --noir-carte-2: #1f1f24;
  --noir-bord: #2a2a30;
  --or: #c9a227;
  --or-clair: #e8c766;
  --or-degrade: linear-gradient(135deg, #e8c766 0%, #c9a227 50%, #8a6d10 100%);
  --blanc: #f5f3ee;
  --gris: #9a9aa1;
  --rouge: #e2574c;
  --vert: #49b17d;
  --radius: 14px;
  --radius-lg: 22px;
  --ombre: 0 10px 30px rgba(0,0,0,.35);
  --police-titre: 'Playfair Display', serif;
  --police-corps: 'Poppins', sans-serif;
  --police-mono: 'JetBrains Mono', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--noir); color: var(--blanc); font-family: var(--police-corps); min-height: 100vh; -webkit-font-smoothing: antialiased; }
h1, h2, h3 { font-family: var(--police-titre); }
button { font-family: var(--police-corps); cursor: pointer; border: none; }

.login-ecran { position: fixed; inset: 0; background: var(--noir); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
.carte { background: var(--noir-carte); border: 1px solid var(--noir-bord); border-radius: var(--radius-lg); padding: 30px; max-width: 400px; width: 100%; text-align: center; box-shadow: var(--ombre); }
.champ { margin-bottom: 18px; text-align: left; }
.champ label { display:block; font-size:.82rem; color:var(--gris); margin-bottom:7px; }
.champ input { width:100%; background: var(--noir-carte-2); border:1px solid var(--noir-bord); color: var(--blanc); padding: 13px 16px; border-radius: 10px; font-size: .95rem; }
.champ input:focus { outline:none; border-color: var(--or); }

.btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 13px 26px; border-radius: 999px; font-weight: 600; width: 100%; }
.btn-or { background: var(--or-degrade); color: #101010; }
.btn-contour { border: 1px solid var(--noir-bord); color: var(--blanc); background: transparent; padding: 8px 16px; width: auto; font-size: .8rem; border-radius: 6px; }

.admin-layout { display: flex; min-height: 100vh; }
.sidebar { width: 260px; background: var(--noir-carte); border-right: 1px solid var(--noir-bord); padding: 30px 20px; display: flex; flex-direction: column; gap: 30px; }
.admin-logo { font-family: var(--police-titre); font-size: 1.3rem; color: var(--or-clair); font-weight: 700; }
.admin-menu { list-style: none; display: flex; flex-direction: column; gap: 8px; }
.admin-menu a { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 10px; color: var(--gris); text-decoration: none; font-size: .95rem; }
.admin-menu li.actif a, .admin-menu a:hover { background: var(--noir-carte-2); color: var(--or-clair); }
.contenu-principal { flex: 1; padding: 40px; background: var(--noir); overflow-y: auto; }

.table-cadre { width: 100%; border-collapse: collapse; background: var(--noir-carte); border: 1px solid var(--noir-bord); border-radius: var(--radius); overflow: hidden; margin-top: 20px; }
.table-cadre th, .table-cadre td { padding: 14px 20px; text-align: left; font-size: .9rem; border-bottom: 1px solid var(--noir-bord); }
.table-cadre th { background: var(--noir-carte-2); color: var(--gris); }

.fc { background: var(--noir-carte); padding: 20px; border-radius: var(--radius); border: 1px solid var(--noir-bord); }
.fc .fc-toolbar-title { color: var(--blanc); }
.fc-event { background: var(--or-degrade) !important; border: none !important; color: #101010 !important; font-weight: 600; padding: 2px 6px; cursor: pointer; }

.fond-modal { position:fixed; inset:0; background:rgba(0,0,0,.7); backdrop-filter:blur(5px); z-index:1000; display:flex; align-items:center; justify-content:center; }
.fenetre-modal { background:var(--noir-carte-2); border:1px solid var(--noir-bord); border-radius:var(--radius-lg); padding:30px; max-width:500px; width:100%; position:relative; }
.fermer-modal { position:absolute; top:20px; right:20px; background:none; color:var(--gris); font-size:1.2rem; }

.badge-statut { font-size:.72rem; padding: 5px 12px; border-radius: 999px; font-weight:600; }
.badge-statut.confirmée { background: rgba(73,177,125,.15); color: var(--vert); }
.badge-statut.annulée { background: rgba(226,87,76,.15); color: var(--rouge); }
.masque { display: none !important; }
</style>
</head>
<body>

<div class="login-ecran" id="ecran-verrouillage">
  <div class="carte">
    <div class="admin-logo" style="margin-bottom:20px;"><i class="fa-solid fa-scissors"></i> Espace Gestion Admin</div>
    <div class="champ">
      <label>Mot de passe d'accès</label>
      <input type="password" id="pass-verif" placeholder="Entrez le mot de passe">
    </div>
    <button class="btn btn-or" onclick="verifierAuthentification()">Connexion</button>
  </div>
</div>

<div class="admin-layout masque" id="panneau-principal">
  <aside class="sidebar">
    <div class="admin-logo">BARBER PRO ADMIN</div>
    <ul class="admin-menu">
      <li class="actif" id="menu-agenda"><a href="#agenda" onclick="ouvrirSousPage('agenda')"><i class="fa-solid fa-calendar-days"></i> Agenda</a></li>
      <li id="menu-reservations"><a href="#reservations" onclick="ouvrirSousPage('reservations')"><i class="fa-solid fa-list-check"></i> Réservations</a></li>
      <li id="menu-prestations"><a href="#prestations" onclick="ouvrirSousPage('prestations')"><i class="fa-solid fa-scissors"></i> Prestations</a></li>
    </ul>
    <div style="margin-top:auto;"><button class="btn-contour" onclick="location.reload()">Déconnexion</button></div>
  </aside>

  <main class="contenu-principal">
    <div class="sous-page" id="page-agenda"><div id="calendrier-full"></div></div>
    
    <div class="sous-page masque" id="page-reservations">
      <h2>Historique Global des Réservations</h2>
      <table class="table-cadre">
        <thead><tr><th>Code</th><th>Client</th><th>Téléphone</th><th>Date & Heure</th><th>Montant</th><th>Statut</th><th>Action</th></tr></thead>
        <tbody id="tableau-reservations-corps"></tbody>
      </table>
    </div>

    <div class="sous-page masque" id="page-prestations">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2>Grille des Prestations</h2>
        <button class="btn-contour" onclick="ouvrirAjoutPrestation()">+ Ajouter</button>
      </div>
      <table class="table-cadre">
        <thead><tr><th>Catégorie</th><th>Prestation</th><th>Durée</th><th>Tarif</th><th>Action</th></tr></thead>
        <tbody id="tableau-prestations-corps"></tbody>
      </table>
    </div>
  </main>
</div>

<div class="fond-modal masque" id="fond-modal">
  <div class="fenetre-modal" id="contenu-modal"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
<script>
const DB = {
  KEYS: { SERVICES: 'services', COIFFEURS: 'coiffeurs', HORAIRES: 'horaires', RESERVATIONS: 'reservations', GALERIE: 'galerie' },
  get(cle) { const v = localStorage.getItem(cle); try { return v ? JSON.parse(v) : null; } catch { return v; } },
  set(cle, val) { localStorage.setItem(cle, typeof val === 'object' ? JSON.stringify(val) : val); }
};

let calendarInstance = null;

function verifierAuthentification() {
  const p = document.getElementById('pass-verif').value;
  if (p === 'admin123' || p === 'admin') {
    document.getElementById('ecran-verrouillage').classList.add('masque');
    document.getElementById('panneau-principal').classList.remove('masque');
    initialiserEspaceAdmin();
  } else { alert('Mot de passe incorrect.'); }
}

function ouvrirSousPage(p) {
  document.querySelectorAll('.sous-page').forEach(x => x.classList.add('masque'));
  document.querySelectorAll('.admin-menu li').forEach(x => x.classList.remove('actif'));
  document.getElementById('page-' + p).classList.remove('masque');
  document.getElementById('menu-' + p).classList.add('actif');
  if (p === 'agenda' && calendarInstance) calendarInstance.render();
  if (p === 'reservations') listerReservations();
  if (p === 'prestations') listerPrestations();
}

function initialiserEspaceAdmin() {
  const el = document.getElementById('calendrier-full');
  calendarInstance = new FullCalendar.Calendar(el, {
    initialView: 'timeGridDay', locale: 'fr', slotMinTime: '09:00', slotMaxTime: '22:00', allDaySlot: false,
    events: function(info, successCallback) {
      const resas = DB.get(DB.KEYS.RESERVATIONS) || [];
      const evts = resas.filter(r => r.statut !== 'annulée').map(r => ({
        id: r.id, title: `${r.clientNom} - ${r.total} DA`, start: `${r.date}T${r.heure}:00`, extendedProps: { rdx: r }
      }));
      successCallback(evts);
    },
    eventClick: function(info) {
      const r = info.event.extendedProps.rdx;
      ouvrirModal(`
        <h3>Ticket #${r.code}</h3><p><b>Client:</b> ${r.clientNom}</p><p><b>Tel:</b> ${r.clientTel}</p><p><b>Prestations:</b> ${r.prestations.map(p=>p.nom).join(', ')}</p><br>
        <button class="btn btn-or" style="background:var(--rouge); color:#fff;" onclick="annulerRendezVous(${r.id})">Annuler le RDV</button>
      `);
    }
  });
  calendarInstance.render();
}

function listerReservations() {
  const corps = document.getElementById('tableau-reservations-corps'); if (!corps) return;
  const resas = DB.get(DB.KEYS.RESERVATIONS) || []; resas.sort((a,b)=>b.id-a.id);
  corps.innerHTML = resas.map(r => `
    <tr><td>#${r.code}</td><td>${r.clientNom}</td><td>${r.clientTel}</td><td>${r.date} à ${r.heure}</td><td>${r.total} DA</td><td><span class="badge-statut ${r.statut}">${r.statut}</span></td>
    <td>${r.statut !== 'annulée' ? `<button onclick="annulerRendezVous(${r.id})">Annuler</button>` : '-'}</td></tr>
  `).join('');
}

function annulerRendezVous(id) {
  const resas = DB.get(DB.KEYS.RESERVATIONS) || []; const r = resas.find(x => x.id === id);
  if (r) { r.statut = 'annulée'; DB.set(DB.KEYS.RESERVATIONS, resas); listerReservations(); if (calendarInstance) calendarInstance.refetchEvents(); fermerModal(); }
}

function listerPrestations() {
  const corps = document.getElementById('tableau-prestations-corps'); if (!corps) return;
  corps.innerHTML = (DB.get(DB.KEYS.SERVICES) || []).map(s => `
    <tr><td>${s.categorie}</td><td>${s.nom}</td><td>${s.duree} min</td><td>${s.tarif} DA</td><td><button onclick="supprimerPrestation(${s.id})">Supprimer</button></td></tr>
  `).join('');
}

function ouvrirAjoutPrestation() {
  ouvrirModal(`
    <h3>Nouvelle Prestation</h3>
    <div class="champ"><label>Catégorie</label><input type="text" id="add-cat"></div>
    <div class="champ"><label>Nom</label><input type="text" id="add-nom"></div>
    <div class="champ"><label>Durée (min)</label><input type="number" id="add-duree"></div>
    <div class="champ"><label>Tarif (DA)</label><input type="number" id="add-tarif"></div>
    <button class="btn btn-or" onclick="enregistrerPrestation()">Ajouter</button>
  `);
}
function enregistrerPrestation() {
  const services = DB.get(DB.KEYS.SERVICES) || [];
  services.push({ id: Date.now(), nom: document.getElementById('add-nom').value, categorie: document.getElementById('add-cat').value, tarif: parseInt(document.getElementById('add-tarif').value), duree: parseInt(document.getElementById('add-duree').value) });
  DB.set(DB.KEYS.SERVICES, services); listerPrestations(); fermerModal();
}
function supprimerPrestation(id) {
  let services = DB.get(DB.KEYS.SERVICES) || []; services = services.filter(x => x.id !== id); DB.set(DB.KEYS.SERVICES, services); listerPrestations();
}

function ouvrirModal(html) { document.getElementById('contenu-modal').innerHTML = `<button class="fermer-modal" onclick="fermerModal()">×</button>${html}`; document.getElementById('fond-modal').classList.remove('masque'); }
function fermerModal() { document.getElementById('fond-modal').classList.add('masque'); }
</script>

<script>
window.addEventListener('load', async () => {
  try {
    const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js");
    const { getDatabase, ref, set, onValue } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js");

    const firebaseConfig = {
      apiKey: "AIzaSyDsjrxUlmUrko9oKADYzgOoHC_qfClEP7Y",
      authDomain: "barber-pro-dz.firebaseapp.com",
      databaseURL: "https://barber-pro-dz-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "barber-pro-dz",
      storageBucket: "barber-pro-dz.firebasestorage.app",
      messagingSenderId: "1011402409421",
      appId: "1:1011402409421:web:218f72ccf7937cfeb0b084",
      measurementId: "G-NPY5N37WZ5"
    };

    const app = initializeApp(firebaseConfig);
    const dbCloud = getDatabase(app);
    const noeudSalon = ref(dbCloud, 'barber_pro_db');
    let blocSync = false;

    if (typeof DB !== 'undefined') {
      onValue(noeudSalon, (snapshot) => {
        const cloud = snapshot.val();
        if (cloud && !blocSync) {
          let modif = false;
          Object.keys(cloud).forEach(k => {
            if (localStorage.getItem(k) !== JSON.stringify(cloud[k])) { localStorage.setItem(k, JSON.stringify(cloud[k])); modif = true; }
          });
          if (modif) { listerReservations(); listerPrestations(); if (calendarInstance) calendarInstance.refetchEvents(); }
        }
      });

      const originalSet = DB.set;
      DB.set = function(cle, val) {
        blocSync = true; originalSet(cle, val);
        set(ref(dbCloud, 'barber_pro_db/' + cle), val).finally(() => blocSync = false);
      };
    }
  } catch(e) { console.error("Erreur Cloud Admin:", e); }
});
</script>
</body>
</html>
