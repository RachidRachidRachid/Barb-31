<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

  const firebaseConfig = {
    databaseURL: "https://barber-pro-dz-default-rtdb.europe-west1.firebasedatabase.app/"
  };

  const app = initializeApp(firebaseConfig);
  const dbCloud = getDatabase(app);
  const noeudSalon = ref(dbCloud, 'barber_pro_db');

  let premierChargement = true;

  window.addEventListener('DOMContentLoaded', () => {
    if (typeof DB !== 'undefined') {
      
      // Écoute temps réel des actions clients
      onValue(noeudSalon, (snapshot) => {
        const donneesCloud = snapshot.val();
        if (donneesCloud) {
          let nouveauRendezVous = false;

          Object.keys(donneesCloud).forEach(cle => {
            const localData = localStorage.getItem(cle);
            const cloudDataStr = JSON.stringify(donneesCloud[cle]);
            
            if (localData !== cloudDataStr) {
              localStorage.setItem(cle, cloudDataStr);
              nouveauRendezVous = true;
            }
          });

          if (nouveauRendezVous && !premierChargement) {
            if (typeof notifierAdmin === 'function') {
              notifierAdmin("<i class='fa-solid fa-bell anim-cloche'></i> Synchro Temps Réel : Nouveau rendez-vous !");
            }
            setTimeout(() => location.reload(), 1000);
          }
          premierChargement = false;
        }
      });

      // Synchronisation vers le cloud lorsque l'admin modifie quelque chose
      DB.set = function(cle, valeur) {
        localStorage.setItem(cle, JSON.stringify(valeur));
        set(ref(dbCloud, 'barber_pro_db/' + cle), valeur);
      };
    }
  });
</script>

<!-- SCRIPT DE SYNCHRONISATION CLOUD - À PLACER JUSTE AVANT DE FERMER BODY -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

  const firebaseConfig = {
    databaseURL: "https://barber-pro-dz-default-rtdb.europe-west1.firebasedatabase.app/"
  };

  const app = initializeApp(firebaseConfig);
  const dbCloud = getDatabase(app);
  const noeudSalon = ref(dbCloud, 'barber_pro_db');

  // On attend que l'application d'origine soit totalement chargée pour ne rien bloquer
  window.addEventListener('load', () => {
    if (typeof DB !== 'undefined') {
      
      // Récupération en arrière-plan des modifications Cloud
      onValue(noeudSalon, (snapshot) => {
        const donneesCloud = snapshot.val();
        if (donneesCloud) {
          Object.keys(donneesCloud).forEach(cle => {
            localStorage.setItem(cle, JSON.stringify(donneesCloud[cle]));
          });
          // Si votre application possède une fonction pour rafraîchir l'écran, on l'exécute
          if (typeof rafraichirInterfaceClient === 'function') rafraichirInterfaceClient();
        }
      });

      // Interception transparente des réservations clients vers le Cloud
      const ancienSet = DB.set;
      DB.set = function(cle, valeur) {
        localStorage.setItem(cle, JSON.stringify(valeur));
        set(ref(dbCloud, 'barber_pro_db/' + cle), valeur);
      };
    }
  });
</script>
